<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Conversor de Divisas — Compiladores</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f1923;
      color: #e8edf2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 { font-size: 2rem; color: #4fc3f7; letter-spacing: 1px; }
    header p  { font-size: .9rem; color: #7a9ab5; margin-top: 6px; }

    .card {
      background: #162330;
      border: 1px solid #1e3347;
      border-radius: 14px;
      padding: 28px 32px;
      width: 100%;
      max-width: 640px;
      margin-bottom: 28px;
    }
    .card h2 { font-size: 1rem; color: #4fc3f7; margin-bottom: 18px; text-transform: uppercase; letter-spacing: .8px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .form-row.single { grid-template-columns: 1fr; }

    label { display: block; font-size: .82rem; color: #7a9ab5; margin-bottom: 6px; }

    input, select {
      width: 100%;
      background: #0f1923;
      border: 1px solid #1e3347;
      border-radius: 8px;
      color: #e8edf2;
      font-size: 1rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, select:focus { border-color: #4fc3f7; }
    select option { background: #0f1923; }

    .cadena-preview {
      background: #0f1923;
      border: 1px dashed #1e3347;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: monospace;
      font-size: .95rem;
      color: #80cbc4;
      margin-bottom: 20px;
      min-height: 38px;
    }

    button {
      width: 100%;
      background: #4fc3f7;
      color: #0f1923;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      padding: 13px;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #81d4fa; }
    button:disabled { background: #1e3347; color: #4a6070; cursor: not-allowed; }

    /* ── Resultado ── */
    .resultado-box {
      background: #0f1923;
      border: 1px solid #1e3347;
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 20px;
    }
    .resultado-valor {
      font-size: 2.2rem;
      font-weight: 700;
      color: #4fc3f7;
      text-align: center;
      margin-bottom: 6px;
    }
    .resultado-sub {
      text-align: center;
      font-size: .85rem;
      color: #7a9ab5;
    }

    /* ── Tabla tokens ── */
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th {
      background: #1e3347;
      color: #4fc3f7;
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
    }
    td { padding: 8px 12px; border-bottom: 1px solid #1a2d3e; }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: #131f2a; }

    /* ── Árbol ── */
    .tree { font-family: monospace; font-size: .85rem; line-height: 1.7; }
    .tree-node { color: #4fc3f7; font-weight: 600; }
    .tree-token { color: #80cbc4; }
    .tree-valor { color: #a5d6a7; }
    ul.tree-list { list-style: none; padding-left: 20px; border-left: 1px solid #1e3347; margin-left: 8px; }

    .error-msg {
      background: #2a1018;
      border: 1px solid #c62828;
      border-radius: 8px;
      padding: 14px 18px;
      color: #ef9a9a;
      font-size: .9rem;
    }

    .hidden { display: none; }
    .section-label {
      font-size: .78rem;
      color: #4a6070;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>Conversor de Divisas</h1>
  <p>Análisis Léxico · Sintáctico · Árbol de Derivación</p>
</header>

<!-- Formulario -->
<div class="card">
  <h2>Nueva Conversión</h2>

  <div class="form-row single">
    <div>
      <label>Cantidad</label>
      <input type="number" id="cantidad" placeholder="Ej: 1500" min="0" step="any"/>
    </div>
  </div>

  <div class="form-row">
    <div>
      <label>Moneda de Origen</label>
      <select id="origen">
        <option value="">— Seleccionar —</option>
        {% for d in divisas %}
        <option value="{{ d }}">{{ d }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label>Moneda de Destino</label>
      <select id="destino">
        <option value="">— Seleccionar —</option>
        {% for d in divisas %}
        <option value="{{ d }}">{{ d }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <p class="section-label">Cadena generada</p>
  <div class="cadena-preview" id="cadena-preview">—</div>

  <button id="btn-convertir" onclick="convertir()">Convertir</button>
</div>

<!-- Resultado -->
<div class="card hidden" id="card-resultado">
  <h2>Resultado</h2>
  <div class="resultado-box">
    <div class="resultado-valor" id="resultado-valor">—</div>
    <div class="resultado-sub" id="resultado-sub"></div>
  </div>
</div>

<!-- Error -->
<div class="card hidden" id="card-error">
  <div class="error-msg" id="error-msg"></div>
</div>

<!-- Tokens -->
<div class="card hidden" id="card-tokens">
  <h2>Analizador Léxico — Tokens</h2>
  <table>
    <thead>
      <tr>
        <th>Línea</th>
        <th>Tipo</th>
        <th>Valor / Lexema</th>
        <th>Posición</th>
      </tr>
    </thead>
    <tbody id="tabla-tokens"></tbody>
  </table>
</div>

<!-- Árbol -->
<div class="card hidden" id="card-arbol">
  <h2>Árbol de Análisis Sintáctico</h2>
  <div class="tree" id="arbol-container"></div>
</div>

<script>
  // Actualizar preview de cadena en tiempo real
  ['cantidad','origen','destino'].forEach(id => {
    document.getElementById(id).addEventListener('input', actualizarPreview);
  });

  function actualizarPreview() {
    const c = document.getElementById('cantidad').value.trim();
    const o = document.getElementById('origen').value;
    const d = document.getElementById('destino').value;
    const preview = document.getElementById('cadena-preview');
    if (c && o && d) {
      preview.textContent = `${c}${o}a${d}$`;
    } else {
      preview.textContent = '—';
    }
  }

  async function convertir() {
    const cantidad = document.getElementById('cantidad').value.trim();
    const origen   = document.getElementById('origen').value;
    const destino  = document.getElementById('destino').value;

    // Ocultar todo
    ['card-resultado','card-error','card-tokens','card-arbol'].forEach(id => {
      document.getElementById(id).classList.add('hidden');
    });

    if (!cantidad || !origen || !destino) {
      mostrarError("Completa todos los campos antes de convertir.");
      return;
    }

    const btn = document.getElementById('btn-convertir');
    btn.disabled = true;
    btn.textContent = 'Procesando...';

    try {
      const res  = await fetch('/convertir', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cantidad, origen, destino })
      });
      const data = await res.json();

      if (data.error) {
        mostrarError(data.error);
      } else {
        mostrarResultado(data);
        mostrarTokens(data.tokens);
        mostrarArbol(data.arbol);
      }
    } catch(e) {
      mostrarError("Error de conexión con el servidor.");
    } finally {
      btn.disabled = false;
      btn.textContent = 'Convertir';
    }
  }

  function mostrarError(msg) {
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('card-error').classList.remove('hidden');
  }

  function mostrarResultado(data) {
    const s = data.semantica;
    document.getElementById('resultado-valor').textContent =
      `${s.resultado.toLocaleString('es-HN', {minimumFractionDigits: 2, maximumFractionDigits: 4})} ${s.cod_destino}`;
    document.getElementById('resultado-sub').textContent =
      `${s.cantidad} ${s.cod_origen}  →  ${s.resultado} ${s.cod_destino}  |  Tasa: 1 ${s.cod_origen} = ${s.tasa} ${s.cod_destino}`;
    document.getElementById('card-resultado').classList.remove('hidden');
  }

  function mostrarTokens(tokens) {
    const tbody = document.getElementById('tabla-tokens');
    tbody.innerHTML = '';
    tokens.forEach(t => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${t.linea}</td><td>${t.tipo}</td><td>${t.valor}</td><td>${t.posicion}</td>`;
      tbody.appendChild(tr);
    });
    document.getElementById('card-tokens').classList.remove('hidden');
  }

  function mostrarArbol(nodo) {
    const container = document.getElementById('arbol-container');
    container.innerHTML = '';
    container.appendChild(renderNodo(nodo));
    document.getElementById('card-arbol').classList.remove('hidden');
  }

  function renderNodo(nodo) {
    const div = document.createElement('div');
    if (nodo.tipo === 'regla') {
      div.innerHTML = `<span class="tree-node">[${nodo.nombre}]</span>`;
      const ul = document.createElement('ul');
      ul.className = 'tree-list';
      nodo.hijos.forEach(hijo => {
        const li = document.createElement('li');
        li.appendChild(renderNodo(hijo));
        ul.appendChild(li);
      });
      div.appendChild(ul);
    } else if (nodo.tipo === 'token') {
      div.innerHTML = `<span class="tree-token">${nodo.nombre}</span>: <span class="tree-valor">"${nodo.valor}"</span>`;
    }
    return div;
  }
</script>
</body>
</html>
